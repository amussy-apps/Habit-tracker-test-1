    window.addEventListener("load", function () {

  <script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo } = React;

/* ─── Design: «Ежедневник тушью» — hanji paper, sumi ink, vermilion seal (도장) for streaks ─── */

const T = {
  paper: "#F5F3ED",
  card: "#FDFCF9",
  ink: "#1C1A17",
  faded: "#8A8478",
  line: "#E4E0D5",
  seal: "#BF3524",
  sealSoft: "#F3DED9",
};

const ICONS = ["✍️", "📖", "🏃", "💧", "🧘", "🈚", "🎯", "🌙", "🥗", "🖌️"];
const STORAGE_KEY = "habits-data-v1";

/* ─── Date utils ─── */
const dstr = (d) => {
  const y = d.getFullYear(), m = String(d.getMonth() + 1).padStart(2, "0"), dd = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${dd}`;
};
const today = () => dstr(new Date());
const addDays = (s, n) => { const d = new Date(s + "T12:00:00"); d.setDate(d.getDate() + n); return dstr(d); };
const WEEKDAYS = ["Пн", "Вт", "Ср", "Чт", "Пт", "Сб", "Вс"];
const MONTHS = ["Январь","Февраль","Март","Апрель","Май","Июнь","Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"];

/* ─── Streak calc ─── */
function calcStreak(completions) {
  let cur = 0, d = today();
  if (!completions[d]) d = addDays(d, -1); // сегодня ещё не отмечено — не рвём серию
  while (completions[d]) { cur++; d = addDays(d, -1); }
  // best
  const dates = Object.keys(completions).sort();
  let best = 0, run = 0, prev = null;
  for (const dt of dates) {
    run = prev && addDays(prev, 1) === dt ? run + 1 : 1;
    if (run > best) best = run;
    prev = dt;
  }
  return { cur, best };
}

function completionRate(h, days = 30) {
  let done = 0;
  for (let i = 0; i < days; i++) if (h.completions[addDays(today(), -i)]) done++;
  return Math.round((done / days) * 100);
}

/* ─── Seal mark (signature element) ─── */
function Seal({ size = 26, active, label }) {
  return (
    <div style={{
      width: size, height: size, borderRadius: "26%",
      display: "flex", alignItems: "center", justifyContent: "center",
      transform: active ? "rotate(-4deg)" : "none",
      background: active ? T.seal : "transparent",
      border: active ? `1.5px solid ${T.seal}` : `1.5px solid ${T.line}`,
      color: active ? "#FBF6F0" : T.line,
      fontFamily: "'Gowun Batang', serif",
      fontSize: size * 0.5, fontWeight: 700, lineHeight: 1,
      boxShadow: active ? "0 0 0 2px rgba(191,53,36,0.12)" : "none",
      transition: "all .18s ease",
    }}>{active ? (label ?? "印") : ""}</div>
  );
}

/* ─── Calendar month grid ─── */
function MonthCal({ habit, month, year }) {
  const first = new Date(year, month, 1);
  const startOffset = (first.getDay() + 6) % 7; // Пн = 0
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const cells = [];
  for (let i = 0; i < startOffset; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);
  const tstr = today();
  return (
    <div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 4, marginBottom: 4 }}>
        {WEEKDAYS.map((w) => (
          <div key={w} style={{ textAlign: "center", fontSize: 10, color: T.faded, letterSpacing: 1 }}>{w}</div>
        ))}
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 4 }}>
        {cells.map((d, i) => {
          if (d === null) return <div key={i} />;
          const ds = dstr(new Date(year, month, d));
          const done = habit.completions[ds];
          const isToday = ds === tstr;
          const future = ds > tstr;
          return (
            <div key={i} style={{
              aspectRatio: "1", display: "flex", alignItems: "center", justifyContent: "center",
              borderRadius: "26%",
              background: done ? T.seal : "transparent",
              border: isToday ? `1.5px solid ${T.ink}` : `1px solid ${done ? T.seal : T.line}`,
              color: done ? "#FBF6F0" : future ? T.line : T.faded,
              fontSize: 11, fontWeight: done ? 700 : 400,
              transform: done ? "rotate(-4deg)" : "none",
            }}>{d}</div>
          );
        })}
      </div>
    </div>
  );
}

/* ─── Main ─── */
function HabitTracker() {
  const [habits, setHabits] = useState(null); // null = загрузка
  const [view, setView] = useState("today"); // today | calendar | stats
  const [showForm, setShowForm] = useState(false);
  const [editId, setEditId] = useState(null);
  const [form, setForm] = useState({ name: "", icon: ICONS[0], target: 7 });
  const now = new Date();
  const [calMonth, setCalMonth] = useState(now.getMonth());
  const [calYear, setCalYear] = useState(now.getFullYear());
  const [selDate, setSelDate] = useState(today());

  /* load */
  useEffect(() => {
    try {
      const r = localStorage.getItem(STORAGE_KEY);
      setHabits(r ? JSON.parse(r) : []);
    } catch { setHabits([]); }
  }, []);

  /* save */
  const persist = (next) => {
    setHabits(next);
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(next)); } catch {}
  };

  const toggle = (id, date = selDate) => {
    persist(habits.map((h) => {
      if (h.id !== id) return h;
      const c = { ...h.completions };
      c[date] ? delete c[date] : (c[date] = true);
      return { ...h, completions: c };
    }));
  };

  const saveHabit = () => {
    if (!form.name.trim()) return;
    if (editId) {
      persist(habits.map((h) => (h.id === editId ? { ...h, name: form.name.trim(), icon: form.icon, target: form.target } : h)));
    } else {
      persist([...habits, { id: Date.now().toString(), name: form.name.trim(), icon: form.icon, target: form.target, createdAt: today(), completions: {} }]);
    }
    setShowForm(false); setEditId(null); setForm({ name: "", icon: ICONS[0], target: 7 });
  };

  const removeHabit = (id) => {
    if (!confirm("Удалить привычку и всю её историю?")) return;
    persist(habits.filter((h) => h.id !== id));
  };

  const startEdit = (h) => { setEditId(h.id); setForm({ name: h.name, icon: h.icon, target: h.target }); setShowForm(true); };

  const [showExport, setShowExport] = useState(false);
  const exportJSON = () => {
    if (habits.length === 0) { alert("Нет привычек"); return; }
    const json = JSON.stringify(habits, null, 2);
    navigator.clipboard.writeText(json).then(() => alert("Скопировано в буфер обмена"));
  };
  const importJSON = async () => {
    try {
      const json = await navigator.clipboard.readText();
      const imported = JSON.parse(json);
      if (!Array.isArray(imported) || !imported.every(h => h.id && h.name)) {
        alert("Неверный формат");
        return;
      }
      persist(imported);
      alert("Загружено");
    } catch { alert("Ошибка"); }
  };

  const weekDone = (h) => {
    let n = 0;
    const dow = (new Date().getDay() + 6) % 7;
    for (let i = 0; i <= dow; i++) if (h.completions[addDays(today(), -i)]) n++;
    return n;
  };

  const allDoneToday = habits && habits.length > 0 && habits.every((h) => h.completions[selDate]);

  if (habits === null) return (
    <div style={{ minHeight: "100vh", background: T.paper, display: "flex", alignItems: "center", justifyContent: "center", color: T.faded, fontFamily: "'Gowun Batang', serif" }}>Загрузка…</div>
  );

  const btn = (active) => ({
    padding: "8px 14px", border: "none", background: "transparent", cursor: "pointer",
    fontFamily: "'Gowun Batang', serif", fontSize: 15,
    color: active ? T.ink : T.faded,
    borderBottom: active ? `2px solid ${T.seal}` : "2px solid transparent",
  });

  const dLabel = new Date(selDate + "T12:00:00");

  return (
    <div style={{ minHeight: "100vh", background: T.paper, color: T.ink, fontFamily: "'Inter', system-ui, sans-serif" }}>
      <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
      <div style={{ maxWidth: 560, margin: "0 auto", padding: "28px 18px 60px" }}>

        {/* Header */}
        <header style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between", marginBottom: 6 }}>
          <h1 style={{ fontFamily: "'Gowun Batang', serif", fontSize: 30, fontWeight: 700, margin: 0 }}>
            Привычки <span style={{ color: T.seal, fontSize: 20 }}>習</span>
          </h1>
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={() => { setShowForm(true); setEditId(null); setForm({ name: "", icon: ICONS[0], target: 7 }); }}
              style={{ background: T.ink, color: T.card, border: "none", borderRadius: 8, padding: "8px 14px", fontSize: 13, fontWeight: 600, cursor: "pointer" }}>
              + Новая
            </button>
            <div style={{ position: "relative" }}>
              <button onClick={() => setShowExport(!showExport)} style={{ background: "transparent", color: T.faded, border: `1px solid ${T.line}`, borderRadius: 8, padding: "8px 10px", fontSize: 13, cursor: "pointer" }}>
                ⋮
              </button>
              {showExport && (
                <div style={{ position: "absolute", right: 0, top: 40, background: T.card, border: `1px solid ${T.line}`, borderRadius: 8, zIndex: 100, minWidth: 120 }}>
                  <button onClick={exportJSON} style={{ display: "block", width: "100%", padding: "10px", border: "none", background: "none", cursor: "pointer", textAlign: "left", fontSize: 13, borderBottom: `1px solid ${T.line}` }}>Экспорт</button>
                  <button onClick={importJSON} style={{ display: "block", width: "100%", padding: "10px", border: "none", background: "none", cursor: "pointer", textAlign: "left", fontSize: 13 }}>Импорт</button>
                </div>
              )}
            </div>
          </div>
        </header>
        <p style={{ margin: "0 0 18px", color: T.faded, fontSize: 13 }}>Каждый выполненный день — оттиск печати.</p>

        {/* Tabs */}
        <nav style={{ display: "flex", gap: 6, borderBottom: `1px solid ${T.line}`, marginBottom: 20 }}>
          <button style={btn(view === "today")} onClick={() => setView("today")}>Сегодня</button>
          <button style={btn(view === "calendar")} onClick={() => setView("calendar")}>Календарь</button>
          <button style={btn(view === "stats")} onClick={() => setView("stats")}>Статистика</button>
        </nav>

        {/* Form */}
        {showForm && (
          <div style={{ background: T.card, border: `1px solid ${T.line}`, borderRadius: 12, padding: 16, marginBottom: 20 }}>
            <div style={{ fontFamily: "'Gowun Batang', serif", fontWeight: 700, marginBottom: 10 }}>{editId ? "Изменить привычку" : "Новая привычка"}</div>
            <input value={form.name} onChange={(e) => setForm({ ...form, name: e.target.value })}
              placeholder="Название — напр. «30 мин корейского»"
              style={{ width: "100%", boxSizing: "border-box", padding: "10px 12px", borderRadius: 8, border: `1px solid ${T.line}`, background: T.paper, fontSize: 14, marginBottom: 10, outline: "none" }} />
            <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 10 }}>
              {ICONS.map((ic) => (
                <button key={ic} onClick={() => setForm({ ...form, icon: ic })}
                  style={{ fontSize: 18, padding: 6, borderRadius: 8, cursor: "pointer", background: form.icon === ic ? T.sealSoft : "transparent", border: form.icon === ic ? `1px solid ${T.seal}` : `1px solid ${T.line}` }}>{ic}</button>
              ))}
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12, fontSize: 13, color: T.faded }}>
              Цель в неделю:
              <input type="range" min={1} max={7} value={form.target} onChange={(e) => setForm({ ...form, target: +e.target.value })} style={{ accentColor: T.seal }} />
              <b style={{ color: T.ink }}>{form.target} дн.</b>
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              <button onClick={saveHabit} style={{ background: T.seal, color: "#FBF6F0", border: "none", borderRadius: 8, padding: "8px 16px", fontWeight: 600, cursor: "pointer" }}>Сохранить</button>
              <button onClick={() => { setShowForm(false); setEditId(null); }} style={{ background: "transparent", color: T.faded, border: `1px solid ${T.line}`, borderRadius: 8, padding: "8px 16px", cursor: "pointer" }}>Отмена</button>
            </div>
          </div>
        )}

        {habits.length === 0 && !showForm && (
          <div style={{ textAlign: "center", padding: "60px 0", color: T.faded }}>
            <div style={{ fontSize: 40, marginBottom: 10 }}>🖌️</div>
            <div style={{ fontFamily: "'Gowun Batang', serif", fontSize: 17 }}>Лист пока чист.</div>
            <div style={{ fontSize: 13, marginTop: 6 }}>Нажмите «+ Новая», чтобы добавить первую привычку.</div>
          </div>
        )}

        {/* ─── TODAY ─── */}
        {view === "today" && habits.length > 0 && (
          <>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
              <button onClick={() => setSelDate(addDays(selDate, -1))} style={{ border: "none", background: "none", cursor: "pointer", color: T.faded, fontSize: 18 }}>←</button>
              <div style={{ fontFamily: "'Gowun Batang', serif", fontSize: 16 }}>
                {selDate === today() ? "Сегодня" : dLabel.toLocaleDateString("ru-RU", { day: "numeric", month: "long" })}
                <span style={{ color: T.faded, fontSize: 12, marginLeft: 8 }}>{WEEKDAYS[(dLabel.getDay() + 6) % 7]}</span>
              </div>
              <button onClick={() => setSelDate(addDays(selDate, 1))} disabled={selDate >= today()}
                style={{ border: "none", background: "none", cursor: selDate >= today() ? "default" : "pointer", color: selDate >= today() ? T.line : T.faded, fontSize: 18 }}>→</button>
            </div>

            {habits.map((h) => {
              const { cur } = calcStreak(h.completions);
              const done = !!h.completions[selDate];
              const wd = weekDone(h);
              return (
                <div key={h.id} onClick={() => toggle(h.id)}
                  style={{ display: "flex", alignItems: "center", gap: 14, background: T.card, border: `1px solid ${done ? T.seal : T.line}`, borderRadius: 12, padding: "14px 16px", marginBottom: 10, cursor: "pointer", transition: "border-color .15s" }}>
                  <Seal size={34} active={done} />
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontWeight: 600, fontSize: 15 }}>{h.icon} {h.name}</div>
                    <div style={{ fontSize: 12, color: T.faded, marginTop: 2 }}>
                      На этой неделе: {wd}/{h.target}
                      {wd >= h.target && <span style={{ color: T.seal }}> ✓ цель</span>}
                    </div>
                  </div>
                  {cur > 0 && (
                    <div style={{ textAlign: "center", minWidth: 44 }}>
                      <div style={{ fontFamily: "'Gowun Batang', serif", fontSize: 20, fontWeight: 700, color: T.seal }}>{cur}</div>
                      <div style={{ fontSize: 10, color: T.faded, letterSpacing: 1 }}>СЕРИЯ</div>
                    </div>
                  )}
                  <div onClick={(e) => e.stopPropagation()} style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                    <button onClick={() => startEdit(h)} title="Изменить" style={{ border: "none", background: "none", cursor: "pointer", color: T.faded, fontSize: 13 }}>✎</button>
                    <button onClick={() => removeHabit(h.id)} title="Удалить" style={{ border: "none", background: "none", cursor: "pointer", color: T.faded, fontSize: 13 }}>✕</button>
                  </div>
                </div>
              );
            })}
            {allDoneToday && (
              <div style={{ textAlign: "center", marginTop: 18, fontFamily: "'Gowun Batang', serif", color: T.seal, fontSize: 15 }}>
                Все печати поставлены. 완료.
              </div>
            )}
          </>
        )}

        {/* ─── CALENDAR ─── */}
        {view === "calendar" && habits.length > 0 && (
          <>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 16 }}>
              <button onClick={() => { calMonth === 0 ? (setCalMonth(11), setCalYear(calYear - 1)) : setCalMonth(calMonth - 1); }}
                style={{ border: "none", background: "none", cursor: "pointer", color: T.faded, fontSize: 18 }}>←</button>
              <div style={{ fontFamily: "'Gowun Batang', serif", fontSize: 17, fontWeight: 700 }}>{MONTHS[calMonth]} {calYear}</div>
              <button onClick={() => { calMonth === 11 ? (setCalMonth(0), setCalYear(calYear + 1)) : setCalMonth(calMonth + 1); }}
                style={{ border: "none", background: "none", cursor: "pointer", color: T.faded, fontSize: 18 }}>→</button>
            </div>
            {habits.map((h) => (
              <div key={h.id} style={{ background: T.card, border: `1px solid ${T.line}`, borderRadius: 12, padding: 16, marginBottom: 14 }}>
                <div style={{ fontWeight: 600, marginBottom: 10, fontSize: 14 }}>{h.icon} {h.name}</div>
                <MonthCal habit={h} month={calMonth} year={calYear} />
              </div>
            ))}
          </>
        )}

        {/* ─── STATS ─── */}
        {view === "stats" && habits.length > 0 && habits.map((h) => {
          const { cur, best } = calcStreak(h.completions);
          const rate = completionRate(h);
          const total = Object.keys(h.completions).length;
          return (
            <div key={h.id} style={{ background: T.card, border: `1px solid ${T.line}`, borderRadius: 12, padding: 16, marginBottom: 12 }}>
              <div style={{ fontWeight: 600, marginBottom: 12, fontSize: 14 }}>{h.icon} {h.name}</div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 8, textAlign: "center" }}>
                {[["Серия", cur], ["Рекорд", best], ["30 дн.", rate + "%"], ["Всего", total]].map(([l, v]) => (
                  <div key={l}>
                    <div style={{ fontFamily: "'Gowun Batang', serif", fontSize: 22, fontWeight: 700, color: l === "Серия" && cur > 0 ? T.seal : T.ink }}>{v}</div>
                    <div style={{ fontSize: 10, color: T.faded, letterSpacing: 1, textTransform: "uppercase" }}>{l}</div>
                  </div>
                ))}
              </div>
              {/* Последние 14 дней */}
              <div style={{ display: "flex", gap: 4, marginTop: 14, justifyContent: "space-between" }}>
                {Array.from({ length: 14 }, (_, i) => {
                  const ds = addDays(today(), -(13 - i));
                  return <Seal key={ds} size={18} active={!!h.completions[ds]} label="·" />;
                })}
              </div>
              <div style={{ fontSize: 10, color: T.faded, marginTop: 4, textAlign: "right" }}>последние 14 дней →</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<HabitTracker />);
  </script>
</body>
</html>
